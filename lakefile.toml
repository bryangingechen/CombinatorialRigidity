name = "CombinatorialRigidity"
version = "0.1.0"
defaultTargets = ["CombinatorialRigidity"]
lintDriver = "batteries/runLinter"

[leanOptions]
# Pretty-prints `fun a ↦ b`
pp.unicode.fun = true
# Don't assume a typo is a new variable
autoImplicit = false
relaxedAutoImplicit = false
# Enable all mathlib linters: automatically matches what mathlib uses.
weak.linter.mathlibStandardSet = true
linter.style.header = false
# Surface `sorry` as a build warning (Lean's default) so a stray one is caught
# by the warning-clean pre-commit gate. The project carries incomplete
# obligations as explicit hypotheses on red blueprint nodes — never as `sorry`
# or `axiom` — so this should always stay clean; the warning is a backstop that
# complements the per-decl `#print axioms` (`sorryAx`) check.
warn.sorry = true

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"

# `checkdecls` provides `lake exe checkdecls`, which the docgen-action
# invokes to verify that every \lean{...} reference in the blueprint
# points to a real declaration in our Lean sources.
rev = "888dee733e93e5cbad6f720c51984035d80230c4"
[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"
rev = "master"

# Phase 8: linear-matroid framing. `apnelson1/Matroid` provides
# `Matroid.ofFun` and `Module.matroid` (the matroid of a linear
# function), which sit on top of mathlib's `IndepMatroid.ofFinitaryCardAugment`
# but aren't yet upstreamed. Pinned to a specific revision so future
# `lake update` runs are deliberate; the lakefile's mathlib pin
# takes precedence over the transitive one from this dep. See
# `notes/Phase8.md` *Architectural choices made up front* and
# `DESIGN.md` *Phase 8: `apnelson1/Matroid` dependency*.
#
# Phase 13: pinned to a one-commit fork off the upstream pin
# (`e6852ce`) carrying a single proof fix — `unifOn_rankPos_iff` in
# `Matroid/Uniform/Basic.lean`, whose `simp` no longer closed under our
# mathlib pin (mathlib-master drift). The fix is a transitive
# prerequisite of `Matroid.Graphic` (`Graph.cycleMatroid`), which
# Phase 13 onward imports for tree-packing; nothing earlier imported it,
# so the breakage went unexercised through Phase 12. No upstream PR by
# request (trivial; upstream tracks mathlib master and will resolve it).
# Retire the fork (back to a direct apnelson1 pin) once upstream
# re-greens against a compatible mathlib. See `notes/Phase13.md`
# *Blockers* and `DESIGN.md` *Phase 8: `apnelson1/Matroid` dependency*.
[[require]]
name = "Matroid"
git = "https://github.com/bryangingechen/Matroid.git"
rev = "08d517f06d6b38cc6ea443ab1d53a441fa03e714"

[[lean_lib]]
name = "CombinatorialRigidity"

# `lake exe pebble-game` — Phase 10 Layer 5 CLI binary. Reads a simple
# edge-list file (leading `n m` line, then `m` lines of two
# whitespace-separated integers `0 ≤ u, v < n`) and prints one of
# `LAMAN` / `SPARSE_NOT_TIGHT` / `NOT_SPARSE` on stdout. The
# classification routes through Phase 10 Layer 3's
# `SimpleGraph.instDecidableIsLaman` and `instDecidableIsSparse`,
# which reduce through the compiled `runPebbleGameExec` body in
# polynomial time. See `blueprint/src/chapter/executable.tex`
# *CLI binary* for the input/output spec.
[[lean_exe]]
name = "pebble-game"
root = "Main"
supportInterpreter = true
