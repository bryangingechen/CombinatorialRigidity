# project status
status:
  scope: >-
    A Lean 4 / mathlib4 formalization of combinatorial rigidity theory, organized in
    four arcs. (1) Laman's theorem (1970): for n >= 2, a graph is generically rigid in
    the plane iff it contains a (2,3)-tight spanning subgraph; proved both directions via
    the Henneberg construction. (2) The planar rigidity matroid (Lovász-Yemini, both the
    combinatorial (2,3)-count form and the linear-matroid form) and an executable,
    certificate-carrying (k,l)-sparsity decision procedure - the Lee-Streinu pebble game -
    with Decidable instances for IsSparse / IsTight / IsLaman and a `lake exe pebble-game`
    CLI emitting inline witnesses. (3) Abstract matroid-union / Edmonds-partition machinery
    (ported locally from apnelson1/Matroid), Tutte-Nash-Williams tree-packing, the k-frame
    matroid as a k-fold cycle-matroid union (Whiteley 1988), and Tay's body-bar theorem and
    the body-hinge / panel-hinge Tay-Whiteley theorem, both in existence-of-realization form.
    (4) Katoh-Tanigawa's 2011 proof of the molecular conjecture together with its molecule
    application - the Grassmann-Cayley extensor algebra (Lemma 2.1), the panel-hinge rigidity
    matrix R(G,p), the deficiency matroid M(G~), the combinatorial induction (Theorem 4.9),
    the algebraic induction realizing that reduction at the rigidity-matrix rank (Theorem 5.5,
    all three cases including the hardest, Case III; Theorem 5.6), the molecular conjecture
    itself (Conjecture 1.2) at every dimension n >= 3, and the molecule application: the 3-D
    generic bar-joint rigidity matroid, the projective-duality + square-graph modelling
    equivalence, and the capstone molecule rank formula r(G^2) = 3|V| - 6 - def(G~)
    (Corollary 5.7). All four arcs (phases 1-26) are complete and sorry-free; the post-program
    exposition-and-synthesis phases (27-29, closed 2026-07-09) changed no mathematical state.
    A post-program algebraic-independence relaxation (phase 30, closed 2026-07-10) simplified
    the molecular-conjecture proof's internals: the inductive seed is now chosen as a non-root
    of a finite product of rank/determinant polynomials instead of being assumed algebraically
    independent over the rationals (Katoh-Tanigawa's footnote-6 device), removing all
    algebraic-independence machinery from the development; the theorem statements above are
    unchanged. A first proof-study phase (31, closed 2026-07-10) landed small internal
    simplifications - an unconsumed rationality hypothesis removed from the general-position
    producers, and the |V| = 3 triangle base folded into Katoh-Tanigawa's Lemma 5.4 cycle
    realization as its smallest instance - plus reconnaissance verdicts: the proof's
    three-case structure is source-shaped (no case merge exists), and the planar (d = 2)
    analogue of the Case III adjacent-degree-2 count is false (K_{2,3}), closing that track.
    Headline statements are unchanged (axioms re-verified at close). A new-mathematics phase
    (32, closed 2026-07-16) formalized two further Jackson-Jordán 2008 corollaries on top of
    the molecule rank formula: Jacobs' conjecture (their Conjecture 5.1 / Thm 5.4 - the square
    graph G^2 is independent in the 3-D generic rigidity matroid iff G^2 satisfies their
    Laman-type 3|V| - 6 sparsity counts - now an unconditional theorem, SimpleGraph.jacobs)
    and their Lemma 4.2 degree-1 rank formula (explicit r(G^2) for connected graphs with
    degree-1 vertices, where the rank formula's min-degree hypothesis fails: the tree case
    r(G^2) = 2|V| - 5 + |V_1|, SimpleGraph.degree_one_rank_tree, and the non-tree reduction
    to the square of the two-core, SimpleGraph.degree_one_rank). A field-generality phase
    (33, closed 2026-07-17) generalized the core Katoh-Tanigawa chain from the reals to an
    arbitrary infinite field of any characteristic: Theorems 5.5/5.6 and the molecular
    conjecture itself are now stated and proved over any infinite field K (typeclass
    hypotheses [Field K] [Infinite K], the latter threaded per-declaration), with KT's
    original real statements as the K = R specialization; the extensor / Grassmann-Cayley
    meet / rigidity-matrix foundations hold over any field. The two formerly ℝ-bound proof
    chokepoints were reproved field-general (the Gram-Schmidt-backed meet-duality crux via
    contragredient equivariance, metric-free; the genericity engine via the maximal-minor
    rank characterization instead of the ordered-field Gram-determinant one). This
    chain-level field generality appears to be new (Whiteley 1988 proves the matroid-union
    layer over any infinite field); headline statement names are unchanged and their axioms
    were re-verified at close. The molecule application (phases 24-26) stays over ℝ
    (three-dimensional physical geometry). A generic-realization strengthening phase
    (34, closed 2026-07-18) upgraded the existence-of-realization statements to their
    generic ("almost all realizations") form via Jackson-Jordán's 2010 coordinate route,
    avoiding Whiteley 1988's variety-irreducibility argument: a realization is generic
    (for row independence) when every rigidity-row family independent at some realization
    is independent at it, and in each framework class one nonzero polynomial in the
    realization parameters confines the non-generic realizations to its zero set. Four
    statement surfaces landed: every generic bar-joint realization of G^2 in R^3 realizes
    the molecule rank formula and is rigid whenever 5G packs six edge-disjoint spanning
    trees (SimpleGraph.molecule_generic_square_packing); the deficiency rank and the
    rigidity characterization at every generic panel-normal assignment, over any infinite
    field (JJ Thm 7.2, sharpened to an iff); Tay's theorem at every generic choice of bar
    endpoints over R (JJ section 5); and the capstone body-hinge form over any infinite
    field - a framework at every generic choice of hinge positions is infinitesimally
    rigid iff (D-1)G packs D edge-disjoint spanning trees (JJ Thm 6.1 / Cor 6.3 with the
    existential quantifier upgraded to every generic realization). A multigraph-strength
    phase (35, closed 2026-07-18) stated the panel side of the molecular conjecture in
    Katoh-Tanigawa's own hinge-coplanar panel model - each hinge required only to lie in a
    panel at each endpoint body, rather than being the meet of the two endpoint panels -
    and proved Conjecture 1.2 and Theorem 5.6 at full multigraph strength, parallel edges
    and loops admitted (Molecular.molecular_conjecture_multigraph,
    Molecular.theorem_55_6_multigraph): the formalized molecular conjecture above is the
    simple-graph case, retained as the stronger concrete statement for simple graphs; its
    meet-based panel model forces parallel edges to share a hinge, and the multigraph iff
    is provably false in that model. Mathlib upstreaming of
    the mirrored lemmas remains queued and unscheduled.
