    incomplete obligations were pinned as explicit hypotheses on red blueprint dep-graph
    nodes (never as `sorry` or `axiom`); with the development complete, none remain.
    `warn.sorry = true` in the lakefile is a backstop. Every main result below was checked
    with `#print axioms` and uses only the three standard axioms.
  main_results:                                                  # the completed headline theorems (four arcs + post-program phases)
  - declaration: "SimpleGraph.isGenericallyRigid_two_iff_exists_isLaman_le"
