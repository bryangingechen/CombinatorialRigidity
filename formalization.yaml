    comparator_config: ""
    literature_dependencies: []

  - declaration: "Graph.BodyBarFramework.tay_witness"
    file: "CombinatorialRigidity/BodyBar/TayTheorem.lean"
    description: >-
      Tay's body-bar theorem (Tay 1984, Whiteley 1988 Thm 8), existence-of-realization form:
      for d = n(n+1)/2, a multigraph carries an independent (resp. isostatic) body-bar
      framework in R^n iff it is (d,d)-sparse (resp. (d,d)-tight).
    sorry_count: 0
    axioms: ["propext", "Classical.choice", "Quot.sound"]
    comparator_config: ""
    literature_dependencies: []

  - declaration: "Graph.BodyHingeFramework.body_hinge_tay"
    file: "CombinatorialRigidity/BodyBar/BodyHinge.lean"
    description: >-
      Body-hinge / panel-hinge Tay-Whiteley theorem (Tay 1989, Whiteley 1988),
      existence-of-realization form: a graph carries an independent (resp. isostatic)
      body-hinge framework in R^n iff its (d-1)-fold edge-multiplication is (d,d)-sparse
      (resp. tight), equivalently a packing of d forests.
    sorry_count: 0
    axioms: ["propext", "Classical.choice", "Quot.sound"]
    comparator_config: ""
    literature_dependencies: []

  - declaration: "CombinatorialRigidity.Molecular.PanelHingeFramework.theorem_55_minimalKDof_gen"
    file: "CombinatorialRigidity/Molecular/AlgebraicInduction/Theorem55.lean"
    description: >-
      Katoh-Tanigawa 2011 Theorem 5.5 (the realization theorem, all three cases including the
      hardest, Case III): every minimal k-dof-graph on >= 2 vertices admits a
      nondegenerate-hinge panel realization whose rigidity matrix attains rank D(|V|-1) - k,
      at every dimension n >= 3 (D = (n+1 choose 2) >= 6) and over any infinite field of any
      characteristic (phase 33; KT's real statement is the K = R case); generic for simple G.
    sorry_count: 0
    axioms: ["propext", "Classical.choice", "Quot.sound"]
    comparator_config: ""
    literature_dependencies: []

  - declaration: "CombinatorialRigidity.Molecular.PanelHingeFramework.rankHypothesis_of_theorem_55_gen"
    file: "CombinatorialRigidity/Molecular/AlgebraicInduction/Theorem55.lean"
    description: >-
      Katoh-Tanigawa 2011 Theorem 5.6: every simple spanning multigraph has a panel-hinge
      realization attaining the deficiency rank, rank R(G,p) = D(|V|-1) - def(G~), at every
      dimension n >= 3 and over any infinite field of any characteristic (phase 33). With the
      def = corank bridge this completes the Katoh-Tanigawa Proposition 1.1 reconciliation
      (CombinatorialRigidity.Molecular.rigidityMatrix_prop11).
    sorry_count: 0
    axioms: ["propext", "Classical.choice", "Quot.sound"]
    comparator_config: ""
    literature_dependencies: []

  - declaration: "CombinatorialRigidity.Molecular.PanelHingeFramework.molecular_conjecture"
    file: "CombinatorialRigidity/Molecular/AlgebraicInduction/Theorem55.lean"
    description: >-
      The Molecular Conjecture (Tay-Whiteley 1984; Katoh-Tanigawa 2011 Conjecture 1.2): a
      simple spanning graph on >= 2 bodies has an infinitesimally rigid genuine body-hinge
      realization iff it has one as a panel-hinge framework, at every dimension n >= 3 and
      over any infinite field of any characteristic (phase 33).
    sorry_count: 0
    axioms: ["propext", "Classical.choice", "Quot.sound"]
    comparator_config: ""
    literature_dependencies: []

  - declaration: "SimpleGraph.molecule_rank_formula"
    file: "CombinatorialRigidity/Molecular/Molecule/Application.lean"
    description: >-
      The molecule rank formula (Jackson-Jordán 2008; Katoh-Tanigawa 2011 Corollary 5.7):
      for a simple graph G of minimum degree >= 2, the rank of the square graph G^2 in the
      3-D generic bar-joint rigidity matroid is r(G^2) = 3|V| - 6 - def(G~) - the
      combinatorial flexibility count for a molecule modelled on G.
    sorry_count: 0
    axioms: ["propext", "Classical.choice", "Quot.sound"]
    comparator_config: ""
    literature_dependencies: []

  - declaration: "SimpleGraph.jacobs"
    file: "CombinatorialRigidity/JacobsTheorem.lean"
    description: >-
      Jacobs' conjecture (Jacobs 1998; Jackson-Jordán 2008 Conjecture 5.1 / Theorem 5.4,
      here unconditional): the square G^2 of a simple graph is independent in the 3-D
      generic bar-joint rigidity matroid iff G^2 satisfies the three-dimensional Laman
      counting condition |E(X)| <= 3|X| - 6 for all |X| >= 3.
    sorry_count: 0
    axioms: ["propext", "Classical.choice", "Quot.sound"]
    comparator_config: ""
    literature_dependencies: []

  - declaration: "SimpleGraph.degree_one_rank"
    file: "CombinatorialRigidity/JacobsDegreeOne.lean"
    description: >-
      The degree-1 rank formula (Jackson-Jordán 2008 Lemma 4.2; the tree case
      SimpleGraph.degree_one_rank_tree is due to Franzblau 2000): for a connected non-tree G,
      r(G^2) = r((G^core)^2) + 2|V \ V(G^core)| + |V_1(G)|, reducing the squared rank to the
      two-core (the maximal subgraph of minimum degree >= 2), where the molecule rank
      formula's hypothesis fails; for a tree, r(G^2) = 2|V| - 5 + |V_1(G)|.
    sorry_count: 0
    axioms: ["propext", "Classical.choice", "Quot.sound"]
    comparator_config: ""
    literature_dependencies: []

  - declaration: "SimpleGraph.molecule_generic_square_packing"
    file: "CombinatorialRigidity/Molecular/Molecule/Application.lean"
    description: >-
      Generic rigidity of squares from six spanning trees (Jackson-Jordán 2010 p. 586,
      unconditional now that the molecular conjecture is a theorem; phase 34): if 5G
      contains six edge-disjoint spanning trees, then every bar-joint realization of G^2
      in R^3 at a placement generic for row independence is infinitesimally rigid.
    sorry_count: 0
    axioms: ["propext", "Classical.choice", "Quot.sound"]
    comparator_config: ""
    literature_dependencies: []

  - declaration: "Graph.BodyBarFramework.isIndependent_and_isInfinitesimallyRigid_ofEndpoints_iff"
    file: "CombinatorialRigidity/BodyBar/GenericLift.lean"
    description: >-
      Tay's theorem at every generic endpoint assignment (Tay 1984; Jackson-Jordán 2010
      section 5; phase 34): the body-bar realization placing each bar on the segment
      between its assigned endpoints, at an endpoint assignment generic for row
      independence, is isostatic (independent and infinitesimally rigid) iff the
      multigraph is (d,d)-tight - the generic form of the body-bar existence theorem,
      quantifying over bar endpoint choices in R^n.
    sorry_count: 0
    axioms: ["propext", "Classical.choice", "Quot.sound"]
    comparator_config: ""
    literature_dependencies: []

  - declaration: "CombinatorialRigidity.Molecular.BodyHingeFramework.isInfinitesimallyRigidOn_ofHinge_isGenericHingePoints_iff_spanningTrees"
    file: "CombinatorialRigidity/Molecular/GenericLift/HingeGeneric.lean"
    description: >-
      Generic body-and-hinge rigidity from spanning trees (Tay 1989, Whiteley 1988;
      Jackson-Jordán 2010 Thm 6.1 / Cor 6.3, with the existential quantifier upgraded to
      every generic realization; phase 34): for a simple spanning multigraph on >= 2
      bodies, at any dimension n >= 3 and over any infinite field, the affine-hinge
      framework at every hinge-point assignment generic for row independence is
      infinitesimally rigid iff (D-1)G contains D pairwise edge-disjoint spanning trees.
      The panel-normal analogue (JJ Thm 7.2, sharpened to an iff) is
      CombinatorialRigidity.Molecular.PanelHingeFramework.isInfinitesimallyRigidOn_ofNormals_isGenericNormals_iff
      (CombinatorialRigidity/Molecular/GenericLift/PanelGeneric.lean).
    sorry_count: 0
    axioms: ["propext", "Classical.choice", "Quot.sound"]
    comparator_config: ""
    literature_dependencies: []

  - declaration: "CombinatorialRigidity.Molecular.molecular_conjecture_multigraph"
    file: "CombinatorialRigidity/Molecular/AlgebraicInduction/Theorem55.lean"
    description: >-
      The Molecular Conjecture at full multigraph strength (Katoh-Tanigawa 2011
      Conjecture 1.2 for multigraphs; phase 35): a spanning multigraph on any nonempty body
      set - parallel edges and loops admitted - has an infinitesimally rigid genuine body-hinge
      realization iff it has an infinitesimally rigid hinge-coplanar panel realization
      (KT's containment model: each hinge lies in the panel of each endpoint body), at
      every dimension n >= 3 and over any infinite field of any characteristic. The
      multigraph Theorem 5.6 behind it is
      CombinatorialRigidity.Molecular.theorem_55_6_multigraph.
    sorry_count: 0
    axioms: ["propext", "Classical.choice", "Quot.sound"]
    comparator_config: ""
    literature_dependencies: []

# how it was produced. Extra per-entry fields are allowed.
automation:                                                      # [required]
  methods:                                                       # one entry per distinct phase/run/tool
    - method: "agent"                                            # [required] manual | copilot | agent | autonomous | other
      models: ["claude-opus-4-7", "claude-opus-4-8", "claude-fable-5", "claude-sonnet-5", "claude-sonnet-4-6", "claude-haiku-4-5-20251001"]   # opus-4-7 was the workhorse through the molecular program (phases 17-26); opus-4-8, fable-5, sonnet-5, and sonnet-4-6 joined across the standalone-repo and post-program eras via the coordinator's per-task model-rung dispatch (haiku/sonnet/opus/fable); haiku-4-5 for lighter/subagent tasks. Whole-history Co-Authored-By trailer counts (2646 commits, 2026-05-06 to 2026-07-09): opus-4-8 ~1805, opus-4-7 322, fable-5 271, sonnet-5 80, sonnet-4-6 58, haiku-4-5 9.
      framework: "Claude Code"
      tool_setup: >-
        Claude Code (CLI); model chosen per task via the `coordinate-phase` orchestration
