# project status
status:
  scope: >-
    A Lean 4 / mathlib4 formalization of combinatorial rigidity theory, organized in
    four arcs. (1) Laman's theorem (1970): for n >= 2, a graph is generically rigid in
    the plane iff it contains a (2,3)-tight spanning subgraph; proved both directions via
    the Henneberg construction. (2) The planar rigidity matroid (Lovász-Yemini, both the
    combinatorial (2,3)-count form and the linear-matroid form) and an executable,
    certificate-carrying (k,l)-sparsity decision procedure - the Lee-Streinu pebble game -
    with Decidable instances for IsSparse / IsTight / IsLaman and a `lake exe pebble-game`
    CLI emitting inline witnesses. (3) Abstract matroid-union / Edmonds-partition machinery
    (ported locally from apnelson1/Matroid), Tutte-Nash-Williams tree-packing, the k-frame
    matroid as a k-fold cycle-matroid union (Whiteley 1988), and Tay's body-bar theorem and
    the body-hinge / panel-hinge Tay-Whiteley theorem, both in existence-of-realization form.
    (4) Katoh-Tanigawa's 2011 proof of the molecular conjecture together with its molecule
    application - the Grassmann-Cayley extensor algebra (Lemma 2.1), the panel-hinge rigidity
    matrix R(G,p), the deficiency matroid M(G~), the combinatorial induction (Theorem 4.9),
    the algebraic induction realizing that reduction at the rigidity-matrix rank (Theorem 5.5,
    all three cases including the hardest, Case III; Theorem 5.6), the molecular conjecture
    itself (Conjecture 1.2) at every dimension n >= 3, and the molecule application: the 3-D
    generic bar-joint rigidity matroid, the projective-duality + square-graph modelling
    equivalence, and the capstone molecule rank formula r(G^2) = 3|V| - 6 - def(G~)
    (Corollary 5.7). All four arcs (phases 1-26) are complete and sorry-free; the post-program
    exposition-and-synthesis phases (27-29, closed 2026-07-09) changed no mathematical state.
    A post-program algebraic-independence relaxation (phase 30, closed 2026-07-10) simplified
    the molecular-conjecture proof's internals: the inductive seed is now chosen as a non-root
    of a finite product of rank/determinant polynomials instead of being assumed algebraically
    independent over the rationals (Katoh-Tanigawa's footnote-6 device), removing all
    algebraic-independence machinery from the development; the theorem statements above are
    unchanged. A first proof-study phase (31, closed 2026-07-10) landed small internal
    simplifications - an unconsumed rationality hypothesis removed from the general-position
    producers, and the |V| = 3 triangle base folded into Katoh-Tanigawa's Lemma 5.4 cycle
    realization as its smallest instance - plus reconnaissance verdicts: the proof's
    three-case structure is source-shaped (no case merge exists), and the planar (d = 2)
    analogue of the Case III adjacent-degree-2 count is false (K_{2,3}), closing that track.
    Headline statements are unchanged (axioms re-verified at close). A new-mathematics phase
    (32, closed 2026-07-16) formalized two further Jackson-Jordán 2008 corollaries on top of
    the molecule rank formula: Jacobs' conjecture (their Conjecture 5.1 / Thm 5.4 - the square
    graph G^2 is independent in the 3-D generic rigidity matroid iff G^2 satisfies their
    Laman-type 3|V| - 6 sparsity counts - now an unconditional theorem, SimpleGraph.jacobs)
    and their Lemma 4.2 degree-1 rank formula (explicit r(G^2) for connected graphs with
    degree-1 vertices, where the rank formula's min-degree hypothesis fails: the tree case
    r(G^2) = 2|V| - 5 + |V_1|, SimpleGraph.degree_one_rank_tree, and the non-tree reduction
    to the square of the two-core, SimpleGraph.degree_one_rank). A field-generality phase
    (33, closed 2026-07-17) generalized the core Katoh-Tanigawa chain from the reals to an
    arbitrary infinite field of any characteristic: Theorems 5.5/5.6 and the molecular
    conjecture itself are now stated and proved over any infinite field K (typeclass
    hypotheses [Field K] [Infinite K], the latter threaded per-declaration), with KT's
    original real statements as the K = R specialization; the extensor / Grassmann-Cayley
    meet / rigidity-matrix foundations hold over any field. The two formerly ℝ-bound proof
    chokepoints were reproved field-general (the Gram-Schmidt-backed meet-duality crux via
    contragredient equivariance, metric-free; the genericity engine via the maximal-minor
    rank characterization instead of the ordered-field Gram-determinant one). This
    chain-level field generality appears to be new (Whiteley 1988 proves the matroid-union
    layer over any infinite field); headline statement names are unchanged and their axioms
    were re-verified at close. The molecule application (phases 24-26) stays over ℝ
    (three-dimensional physical geometry). A generic-realization strengthening phase
    (34, opened 2026-07-17, in progress) asks whether the existence-of-realization
    statements - Tay's body-bar theorem, the body-hinge Tay-Whiteley theorem, and the
    molecular statement surface - upgrade to the generic ("almost all realizations")
    form via Jackson-Jordán's 2010 coordinate route; it opens with a reconnaissance of
    whether the phase-30 product-polynomial device can substitute for their
    algebraic-independence-over-the-rationals genericity layer, before any construction
    is attempted; no mathematical state change yet (all previous results remain complete
    and sorry-free). Mathlib upstreaming of the mirrored lemmas remains queued and
    unscheduled.
  sorry_count: 0
  sorry_in_definitions: 0
  axioms: ["propext", "Classical.choice", "Quot.sound"]          # only Lean/mathlib standard axioms; no project-specific axioms
  policy: >-
    The project carries no `sorry` and no project-specific `axiom`. During development,
    incomplete obligations were pinned as explicit hypotheses on red blueprint dep-graph
    nodes (never as `sorry` or `axiom`); with the development complete, none remain.
    `warn.sorry = true` in the lakefile is a backstop. Every main result below was checked
    with `#print axioms` and uses only the three standard axioms.
  main_results:                                                  # the completed headline theorems (four arcs + post-program phases)
  - declaration: "SimpleGraph.isGenericallyRigid_two_iff_exists_isLaman_le"
    file: "CombinatorialRigidity/LamanTheorem.lean"
    description: "Laman's theorem (1970): for n >= 2, G is generically rigid in the plane iff it contains a Laman (= (2,3)-tight) spanning subgraph."
    sorry_count: 0
    axioms: ["propext", "Classical.choice", "Quot.sound"]
    comparator_config: ""
    literature_dependencies: []

  - declaration: "SimpleGraph.linearRigidityMatroid_eq_rigidityMatroid"
    file: "CombinatorialRigidity/LinearRigidityMatroid.lean"
    description: "Lovász-Yemini, linear-matroid form: the generic-placement linear rigidity matroid (via Matroid.ofFun) equals the combinatorial (2,3)-count rigidity matroid."
    sorry_count: 0
    axioms: ["propext", "Classical.choice", "Quot.sound"]
    comparator_config: ""
    literature_dependencies: []

  - declaration: "SimpleGraph.countMatroid_indep_iff_runPebbleGame"
    file: "CombinatorialRigidity/PebbleGame/Correctness.lean"
    description: >-
      Lee-Streinu pebble-game correctness: in the matroidal regime l < 2k, edge-set
      independence in the (k,l)-count matroid is decided by the verdict-bearing pebble game.
      Powers the executable decision procedure `SimpleGraph.instDecidableIsLaman` /
      `instDecidableIsSparse` / `instDecidableIsTight` (PebbleGame/Exec.lean) and the
      `lake exe pebble-game` CLI.
    sorry_count: 0
    axioms: ["propext", "Classical.choice", "Quot.sound"]
    comparator_config: ""
    literature_dependencies: []

  - declaration: "Graph.tutte_nash_williams"
    file: "CombinatorialRigidity/BodyBar/TreePacking.lean"
    description: "Tutte-Nash-Williams tree-packing (1961): a multigraph is the edge-disjoint union of k forests iff it is (k,k)-sparse. Specialized from the local Edmonds matroid-partition machinery."
    sorry_count: 0
    axioms: ["propext", "Classical.choice", "Quot.sound"]
    comparator_config: ""
    literature_dependencies: []

  - declaration: "Graph.kFrameMatroid_eq_unionPow_cycleMatroid"
    file: "CombinatorialRigidity/BodyBar/KFrame.lean"
    description: "Whiteley 1988 Theorem 1: the generic k-frame matroid equals the k-fold union of the graphic (cycle) matroid, restricted to E(G)."
    sorry_count: 0
    axioms: ["propext", "Classical.choice", "Quot.sound"]
    comparator_config: ""
    literature_dependencies: []

  - declaration: "Graph.BodyBarFramework.tay_witness"
    file: "CombinatorialRigidity/BodyBar/TayTheorem.lean"
    description: >-
      Tay's body-bar theorem (Tay 1984, Whiteley 1988 Thm 8), existence-of-realization form:
      for d = n(n+1)/2, a multigraph carries an independent (resp. isostatic) body-bar
      framework in R^n iff it is (d,d)-sparse (resp. (d,d)-tight).
    sorry_count: 0
    axioms: ["propext", "Classical.choice", "Quot.sound"]
    comparator_config: ""
    literature_dependencies: []

  - declaration: "Graph.BodyHingeFramework.body_hinge_tay"
    file: "CombinatorialRigidity/BodyBar/BodyHinge.lean"
    description: >-
      Body-hinge / panel-hinge Tay-Whiteley theorem (Tay 1989, Whiteley 1988),
      existence-of-realization form: a graph carries an independent (resp. isostatic)
      body-hinge framework in R^n iff its (d-1)-fold edge-multiplication is (d,d)-sparse
      (resp. tight), equivalently a packing of d forests.
    sorry_count: 0
    axioms: ["propext", "Classical.choice", "Quot.sound"]
    comparator_config: ""
    literature_dependencies: []

  - declaration: "CombinatorialRigidity.Molecular.PanelHingeFramework.theorem_55_minimalKDof_gen"
    file: "CombinatorialRigidity/Molecular/AlgebraicInduction/Theorem55.lean"
    description: >-
      Katoh-Tanigawa 2011 Theorem 5.5 (the realization theorem, all three cases including the
      hardest, Case III): every minimal k-dof-graph on >= 2 vertices admits a
      nondegenerate-hinge panel realization whose rigidity matrix attains rank D(|V|-1) - k,
      at every dimension n >= 3 (D = (n+1 choose 2) >= 6) and over any infinite field of any
      characteristic (phase 33; KT's real statement is the K = R case); generic for simple G.
    sorry_count: 0
    axioms: ["propext", "Classical.choice", "Quot.sound"]
    comparator_config: ""
    literature_dependencies: []

  - declaration: "CombinatorialRigidity.Molecular.PanelHingeFramework.rankHypothesis_of_theorem_55_gen"
    file: "CombinatorialRigidity/Molecular/AlgebraicInduction/Theorem55.lean"
    description: >-
      Katoh-Tanigawa 2011 Theorem 5.6: every simple spanning multigraph has a panel-hinge
      realization attaining the deficiency rank, rank R(G,p) = D(|V|-1) - def(G~), at every
      dimension n >= 3 and over any infinite field of any characteristic (phase 33). With the
      def = corank bridge this completes the Katoh-Tanigawa Proposition 1.1 reconciliation
      (CombinatorialRigidity.Molecular.rigidityMatrix_prop11).
    sorry_count: 0
    axioms: ["propext", "Classical.choice", "Quot.sound"]
    comparator_config: ""
    literature_dependencies: []

  - declaration: "CombinatorialRigidity.Molecular.PanelHingeFramework.molecular_conjecture"
    file: "CombinatorialRigidity/Molecular/AlgebraicInduction/Theorem55.lean"
    description: >-
      The Molecular Conjecture (Tay-Whiteley 1984; Katoh-Tanigawa 2011 Conjecture 1.2): a
      simple spanning graph on >= 2 bodies has an infinitesimally rigid genuine body-hinge
      realization iff it has one as a panel-hinge framework, at every dimension n >= 3 and
      over any infinite field of any characteristic (phase 33).
    sorry_count: 0
    axioms: ["propext", "Classical.choice", "Quot.sound"]
    comparator_config: ""
    literature_dependencies: []

  - declaration: "SimpleGraph.molecule_rank_formula"
    file: "CombinatorialRigidity/Molecular/Molecule/Application.lean"
    description: >-
      The molecule rank formula (Jackson-Jordán 2008; Katoh-Tanigawa 2011 Corollary 5.7):
      for a simple graph G of minimum degree >= 2, the rank of the square graph G^2 in the
      3-D generic bar-joint rigidity matroid is r(G^2) = 3|V| - 6 - def(G~) - the
      combinatorial flexibility count for a molecule modelled on G.
    sorry_count: 0
    axioms: ["propext", "Classical.choice", "Quot.sound"]
    comparator_config: ""
    literature_dependencies: []

  - declaration: "SimpleGraph.jacobs"
    file: "CombinatorialRigidity/JacobsTheorem.lean"
    description: >-
      Jacobs' conjecture (Jacobs 1998; Jackson-Jordán 2008 Conjecture 5.1 / Theorem 5.4,
      here unconditional): the square G^2 of a simple graph is independent in the 3-D
      generic bar-joint rigidity matroid iff G^2 satisfies the three-dimensional Laman
      counting condition |E(X)| <= 3|X| - 6 for all |X| >= 3.
    sorry_count: 0
    axioms: ["propext", "Classical.choice", "Quot.sound"]
    comparator_config: ""
    literature_dependencies: []

  - declaration: "SimpleGraph.degree_one_rank"
    file: "CombinatorialRigidity/JacobsDegreeOne.lean"
    description: >-
      The degree-1 rank formula (Jackson-Jordán 2008 Lemma 4.2; the tree case
      SimpleGraph.degree_one_rank_tree is due to Franzblau 2000): for a connected non-tree G,
      r(G^2) = r((G^core)^2) + 2|V \ V(G^core)| + |V_1(G)|, reducing the squared rank to the
      two-core (the maximal subgraph of minimum degree >= 2), where the molecule rank
      formula's hypothesis fails; for a tree, r(G^2) = 2|V| - 5 + |V_1(G)|.
    sorry_count: 0
    axioms: ["propext", "Classical.choice", "Quot.sound"]
    comparator_config: ""
    literature_dependencies: []

