# fidelity
fidelity:
  divergences: >-
    The body-bar (tay_witness) and body-hinge (body_hinge_tay) theorems are formalized in
    existence-of-realization form with an explicit standard-basis witness (degenerate
    realizations permitted): "there exists an independent/isostatic realization iff the count
    holds." Whiteley's stronger "almost all realizations are rigid" (irreducible-variety)
    statement is intentionally deferred. The (k,l)-count matroid and the pebble game are
    developed in the matroidal regime l < 2k (which covers the (2,3) Laman case); the general
    l >= 2k regime is out of scope. The k-frame / cycle-matroid-union identity holds after
    restriction to E(G) (`|^ E(G)`), forced because the vendored Matroid.Union has ground set
    `univ` and carries every non-edge as a loop. Many results are stated more generally than
    their classical sources - over mathlib's multigraph `Graph alpha beta` and/or general
    dimension - rather than for the specific graph/dimension in the original paper. The
    matroid-union / Edmonds-partition subsystem under CombinatorialRigidity/Matroid/ is ported
    from Peter Nelson's apnelson1/Matroid (Apache-2.0), rebased onto the package's live
    FiniteCircuitMatroid constructor; it is formalized, not assumed. The def = corank bridge
    is the project's in-repo framing of Jackson-Jordán 2009 Thm 6.1 / Cor 6.2, proved
    axiom-free via weak duality plus an Edmonds-optimal reverse. The molecular program
    (Katoh-Tanigawa 2011, phases 17-26) is fully formalized at full KT strength (all degrees
    of freedom, genuine hinges), with Theorems 5.5/5.6 and Conjecture 1.2 formalized at every
    dimension n >= 3 (equivalently D = (n+1 choose 2) >= 6); smaller dimensions are out of
    scope. Since phase 33 those statements are additionally proved over any infinite field of
    any characteristic (KT's real statements are the K = R specialization) - a generalization,
    not a weakening; the molecule application (phases 24-26) remains over R. One deliberate method divergence (phase 30): Katoh-Tanigawa fix the inductive
    realization's coordinates algebraically independent over the rationals (their footnote 6),
    so one seed is generic for every rank polynomial at once; the formalization instead
    chooses, at each composition, a seed off the zero locus of the finitely many polynomials
    that composition tests (a product of rank and determinant polynomials fixed before the
    seed) - the statements proved are the same. The molecule
    modelling equivalence (phase 25) is delivered at the rank / motion-space-dimension level -
    the linear isomorphism between molecular motions of G and bar-joint motions of (G^2, c) -
    not as the realizability-iff package of the survey literature; that level is exactly what
    Corollary 5.7 consumes. The molecule rank formula holds for simple graphs of minimum
    degree >= 2, matching its source (Jackson-Jordán 2008). In phase 32, Jackson-Jordán's
    three-dimensional Laman condition is a standalone predicate with their |X| >= 3 guard
    (not an instance of the project's (k,l)-sparsity family, whose guard admits |X| = 2 at
    (3,6), where the count fails on any edge), and the two degree-1 rank formulas are proved
    by support-relative induction on a fixed vertex set (the peeled leaf remains as an
    isolated vertex); both statements match Jackson-Jordán 2008 Lemma 4.2 / Theorem 5.4.

# review status
review:
  status: "self-assessed"                                        # [required]
  reviewers: ["Bryan Gin-ge Chen"]
  notes: >-
    No external human peer review. Confidence rests on: a fully green CI build on every push
    (Lean compile, blueprint web/PDF, and checkdecls cross-checking every blueprint \lean{...}
    pointer against the Lean environment); per-result `#print axioms` checks (all eleven main
    results use only propext / Classical.choice / Quot.sound); the lakefile's `warn.sorry`
    backstop; and continuous AI-agent review (between-phase cleanup rounds auditing
    Lean/blueprint divergence and long proofs, plus /code-review and friction-review passes),
    overseen by the author.

# alignment - how source statements map to formal declarations.
alignment:
  namespace: "(mixed) SimpleGraph, Graph, CombinatorialRigidity.Molecular, Matroid"
  statements:
    - source: "Laman 1970, main theorem"
      lean: "SimpleGraph.isGenericallyRigid_two_iff_exists_isLaman_le"
      module: "CombinatorialRigidity/LamanTheorem.lean"
      status: "proved"

    - source: "Lovász-Yemini 1982 (rigidity matroid = (2,3)-count matroid), linear form"
      lean: "SimpleGraph.linearRigidityMatroid_eq_rigidityMatroid"
      module: "CombinatorialRigidity/LinearRigidityMatroid.lean"
      status: "proved"

    - source: "Lee-Streinu 2008 pebble-game correctness (matroidal regime l < 2k)"
      lean: "SimpleGraph.countMatroid_indep_iff_runPebbleGame, SimpleGraph.PartialOrientation.runPebbleGame_isAccept_iff, SimpleGraph.instDecidableIsLaman"
      module: "CombinatorialRigidity/PebbleGame/Correctness.lean, CombinatorialRigidity/PebbleGame/Exec.lean"
      status: "proved"

    - source: "Edmonds 1965/1970, Nash-Williams 1966: matroid union & partition rank formula"
      lean: "Matroid.Union, Matroid.matroid_partition'"
      module: "CombinatorialRigidity/Matroid/Constructions/Union.lean"
      status: "proved"
      note: "Ported from apnelson1/Matroid (Apache-2.0)."

    - source: "Tutte 1961 / Nash-Williams 1961 tree-packing"
      lean: "Graph.tutte_nash_williams"
      module: "CombinatorialRigidity/BodyBar/TreePacking.lean"
      status: "proved"

    - source: "Whiteley 1988 Thm 1: k-frame matroid = k-fold cycle-matroid union"
      lean: "Graph.kFrameMatroid_eq_unionPow_cycleMatroid"
      module: "CombinatorialRigidity/BodyBar/KFrame.lean"
      status: "proved"

    - source: "Tay 1984 / Whiteley 1988 Thm 8: body-bar Tay theorem (existence form)"
      lean: "Graph.BodyBarFramework.tay_witness"
      module: "CombinatorialRigidity/BodyBar/TayTheorem.lean"
      status: "proved"

    - source: "Tay 1989 / Whiteley 1988: body-hinge / panel-hinge Tay-Whiteley theorem (existence form)"
      lean: "Graph.BodyHingeFramework.body_hinge_tay"
      module: "CombinatorialRigidity/BodyBar/BodyHinge.lean"
      status: "proved"

    - source: "Katoh-Tanigawa 2011, Lemma 2.1 (Grassmann-Cayley extensor independence)"
      lean: "CombinatorialRigidity.Molecular.omitTwoExtensor_linearIndependent"
      module: "CombinatorialRigidity/Molecular/Extensor.lean"
      status: "proved"

    - source: "Jackson-Jordán 2009 Thm 6.1 / Cor 6.2 (def = corank bridge)"
      lean: "Graph.isBase_ncard_add_deficiency_eq, Graph.rank_add_deficiency_eq"
      module: "CombinatorialRigidity/Molecular/Deficiency.lean"
      status: "proved"

    - source: "Katoh-Tanigawa 2011, Theorem 4.9 (combinatorial induction / minimal k-dof reduction)"
      lean: "Graph.minimal_kdof_reduction"
      module: "CombinatorialRigidity/Molecular/Induction/ForestSurgery/Reduction.lean"
      status: "proved"

    - source: "Katoh-Tanigawa 2011, Theorem 5.5 (realization at the target rank, Cases I-III)"
      lean: "CombinatorialRigidity.Molecular.PanelHingeFramework.theorem_55_minimalKDof_gen"
      module: "CombinatorialRigidity/Molecular/AlgebraicInduction/Theorem55.lean"
      status: "proved"

    - source: "Katoh-Tanigawa 2011, Theorem 5.6 + Proposition 1.1 (deficiency rank; rank R = D(|V|-1) - def)"
      lean: "CombinatorialRigidity.Molecular.PanelHingeFramework.rankHypothesis_of_theorem_55_gen, CombinatorialRigidity.Molecular.rigidityMatrix_prop11"
      module: "CombinatorialRigidity/Molecular/AlgebraicInduction/Theorem55.lean, CombinatorialRigidity/Molecular/AlgebraicInduction/PanelHinge.lean"
      status: "proved"

    - source: "Katoh-Tanigawa 2011, Conjecture 1.2 (the Molecular Conjecture; Tay-Whiteley 1984)"
      lean: "CombinatorialRigidity.Molecular.PanelHingeFramework.molecular_conjecture"
      module: "CombinatorialRigidity/Molecular/AlgebraicInduction/Theorem55.lean"
      status: "proved"
      note: "At every dimension n >= 3 (D = (n+1 choose 2) >= 6) and over any infinite field, any characteristic (phase 33)."

    - source: "Jackson-Jordán 2008 / Katoh-Tanigawa 2011 Corollary 5.7 (molecule rank formula r(G^2) = 3|V| - 6 - def(G~))"
      lean: "SimpleGraph.molecule_rank_formula"
      module: "CombinatorialRigidity/Molecular/Molecule/Application.lean"
      status: "proved"

    - source: "Jacobs 1998 / Jackson-Jordán 2008 Conjecture 5.1, Theorem 5.4 (Jacobs' conjecture, unconditional)"
      lean: "SimpleGraph.jacobs"
      module: "CombinatorialRigidity/JacobsTheorem.lean"
      status: "proved"
      note: "JJ 2008 prove it modulo their rank-formula conjecture; with the rank formula formalized (phase 26) the iff is unconditional. Their Thm 5.3 counting bound is SimpleGraph.laman_square_count (CombinatorialRigidity/JacobsCounting.lean)."

    - source: "Jackson-Jordán 2008 Lemma 4.2 (degree-1 rank formula; tree case Franzblau 2000)"
      lean: "SimpleGraph.degree_one_rank_tree, SimpleGraph.degree_one_rank"
      module: "CombinatorialRigidity/JacobsDegreeOne.lean"
      status: "proved"

