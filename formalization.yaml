    description: "Laman's theorem (1970): for n >= 2, G is generically rigid in the plane iff it contains a Laman (= (2,3)-tight) spanning subgraph."
    sorry_count: 0
    axioms: ["propext", "Classical.choice", "Quot.sound"]
    comparator_config: ""
    literature_dependencies: []

