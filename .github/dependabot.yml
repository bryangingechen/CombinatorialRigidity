# Dependabot configuration for GitHub Actions only. Runs monthly and
# bundles every action update into a single grouped PR (titled "Bump the
# github-actions group with N updates") so we don't get a stream of
# one-off bumps. Lean / lake dependencies are handled by hopscotch and
# do not flow through Dependabot.
#
# leanprover-community/* actions are explicitly ignored because we
# intentionally track their @main / @v1 refs (see .github/workflows/).

version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"
    ignore:
      - dependency-name: "leanprover-community/*"
