name: Pull request CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  build_project:
    runs-on: ubuntu-latest
    name: Build project (PR check)
    steps:
      - name: Checkout project
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Build and lint Lean project
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          build: true
          lint: true

      # Build the blueprint and docs on PRs so we catch breakage before
      # merging, but do not deploy from PRs.
      - name: Compile blueprint and documentation (no deploy)
        uses: leanprover-community/docgen-action@main
        with:
          blueprint: true
          homepage: home_page
          deploy: false
